name: "[Python] Check Spec Test Cases"

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read

concurrency:
  group: python-check-spec-tests
  cancel-in-progress: true

jobs:
  check-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for new spec changes and create issues
        env:
          GH_TOKEN_READ: ${{ github.token }}
          GH_TOKEN_WRITE: ${{ secrets.ISSUE_CREATE_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Use GITHUB_TOKEN for reading public repos (works cross-org),
          # ISSUE_CREATE_GITHUB_TOKEN only for issue creation/assignment.
          export GH_TOKEN="$GH_TOKEN_READ"

          PACKAGE_JSON_URL="https://raw.githubusercontent.com/microsoft/typespec/main/packages/http-client-python/package.json"
          SKILL_URL="https://github.com/microsoft/typespec/blob/main/.github/skills/python-sdk-spector-mock-api-tests/SKILL.md"
          ISSUE_REPO="msyyc/typespec"

          # Fetch package.json from main branch once
          PACKAGE_JSON_CONTENT=$(curl -fsSL "$PACKAGE_JSON_URL")
          if [ -z "$PACKAGE_JSON_CONTENT" ]; then
            echo "ERROR: Could not fetch package.json from main branch"
            exit 1
          fi

          check_package() {
            local pkg_name="$1"
            local repo="$2"
            local specs_path="$3"

            echo "=============================="
            echo "Checking package: $pkg_name"
            echo "=============================="

            # Step 1: Extract version A from package.json devDependencies (main branch)
            local version_a
            if [ "$pkg_name" = "@azure-tools/azure-http-specs" ]; then
              version_a="0.1.0-alpha.38-dev.1"
            else
              version_a=$(echo "$PACKAGE_JSON_CONTENT" | jq -r ".devDependencies[\"$pkg_name\"]")
              if [ -z "$version_a" ] || [ "$version_a" = "null" ]; then
                echo "WARNING: Could not find $pkg_name in devDependencies, skipping"
                return
              fi
            fi
            echo "Version A (from main branch package.json): $version_a"

            # Step 2: Get publish dates and find the most recently published version (including dev/prerelease)
            local time_data
            time_data=$(npm view "$pkg_name" time --json 2>/dev/null || true)
            if [ -z "$time_data" ]; then
              echo "WARNING: Could not get time data for $pkg_name from npm, skipping"
              return
            fi

            # Find the most recently published version (excluding "created" and "modified" metadata keys)
            local version_b
            version_b=$(echo "$time_data" | jq -r 'to_entries | map(select(.key != "created" and .key != "modified")) | sort_by(.value) | last | .key')
            if [ -z "$version_b" ] || [ "$version_b" = "null" ]; then
              echo "WARNING: Could not determine latest version from npm time data, skipping"
              return
            fi
            echo "Version B (most recently published): $version_b"

            local date_a
            date_a=$(echo "$time_data" | jq -r ".[\"$version_a\"]")
            local date_b
            date_b=$(echo "$time_data" | jq -r ".[\"$version_b\"]")

            if [ "$date_a" = "null" ] || [ -z "$date_a" ]; then
              echo "WARNING: Could not find publish date for version $version_a, skipping"
              return
            fi
            if [ "$date_b" = "null" ] || [ -z "$date_b" ]; then
              echo "WARNING: Could not find publish date for version $version_b, skipping"
              return
            fi

            echo "Date A ($version_a): $date_a"
            echo "Date B ($version_b): $date_b"

            # Compare dates - if B (latest) is newer than A (pinned), there are new specs to check
            if [[ "$date_b" > "$date_a" ]]; then
              echo "Latest version is newer than pinned, proceeding to check for PRs..."
            else
              echo "Pinned version is up-to-date, skipping $pkg_name"
              return
            fi

            # Step 4: Find PRs merged in the date range that touch the specs path.
            # Note: The Commits API since/until filters by author date, which misses PRs
            # authored before the window but merged within it. Instead, search for merged PRs
            # by merge date and then check which ones touch the specs path.
            local search_date_a="${date_a:0:10}"
            local search_date_b="${date_b:0:10}"
            echo "Searching for PRs merged between $search_date_a and $search_date_b in $repo affecting $specs_path"

            local merged_prs
            if ! merged_prs=$(gh pr list --repo "${repo}" --state merged --search "merged:${search_date_a}..${search_date_b}" --limit 200 --json number --jq '.[].number'); then
              echo "WARNING: Failed to search for merged PRs in ${repo}, skipping"
              return
            fi

            if [ -z "$merged_prs" ]; then
              echo "No PRs merged in date range, skipping"
              return
            fi

            local merged_count
            merged_count=$(echo "$merged_prs" | wc -l | tr -d ' ')
            echo "Found $merged_count PRs merged in date range, checking which touch specs..."

            local pr_numbers=""
            while IFS= read -r pr; do
              [ -z "$pr" ] && continue
              local touches_specs
              touches_specs=$(gh api "repos/${repo}/pulls/${pr}/files" --paginate --jq '.[].filename' 2>/dev/null | grep "^${specs_path}" || true)
              if [ -n "$touches_specs" ]; then
                echo "PR #$pr touches specs path"
                pr_numbers="${pr_numbers}${pr}"$'\n'
              fi
            done <<< "$merged_prs"
            pr_numbers=$(echo "$pr_numbers" | sed '/^$/d' | sort -un)

            if [ -z "$pr_numbers" ]; then
              echo "No PRs found affecting specs path in date range, skipping"
              return
            fi

            local pr_count
            pr_count=$(echo "$pr_numbers" | wc -l | tr -d ' ')
            echo "Found $pr_count PRs affecting specs in date range"

            # Step 5: Switch to write token for issue operations on ISSUE_REPO
            export GH_TOKEN="$GH_TOKEN_WRITE"

            # Fetch existing issues once (across all states) to avoid duplicate creation
            local existing_issues
            existing_issues=$(gh issue list --repo "$ISSUE_REPO" --state all --search "in:title [python] add test case" --json title --limit 200 2>/dev/null || echo "[]")

            while IFS= read -r pr_number; do
              [ -z "$pr_number" ] && continue
              local pr_url="https://github.com/${repo}/pull/${pr_number}"

              echo "PR #$pr_number affects specs: $pr_url"

              local title="[python] add test case for ${pr_url}"
              local body="follow skill ${SKILL_URL} to write test case for ${pr_url}"

              # Check if an issue with the same title already exists (open or closed)
              local has_match
              has_match=$(echo "$existing_issues" | jq --arg t "$title" '[.[] | select(.title == $t)] | length')

              if [ "$has_match" -gt 0 ]; then
                echo "Issue already exists for PR $pr_url, skipping"
                continue
              fi

              # Create the issue
              local issue_url
              issue_url=$(gh issue create --repo "$ISSUE_REPO" \
                --title "$title" \
                --body "$body" \
                --label "emitter:client:python")

              echo "Created issue for PR $pr_url: $issue_url"

              # Assign copilot via GraphQL API (REST --assignee doesn't work for bot accounts)
              local issue_num
              issue_num=$(echo "$issue_url" | grep -oE '[0-9]+$')

              # Get issue node ID and copilot bot ID from suggestedActors
              local issue_node_id copilot_bot_id
              local actors_result
              if ! actors_result=$(gh api graphql \
                -H "GraphQL-Features: issues_copilot_assignment_api_support" \
                -f query='query($owner:String!,$repo:String!,$num:Int!){
                  repository(owner:$owner,name:$repo){
                    issue(number:$num){
                      id
                      suggestedActors(first:20){
                        nodes{ ... on Bot { login id } }
                      }
                    }
                  }
                }' -f owner="${ISSUE_REPO%%/*}" -f repo="${ISSUE_REPO##*/}" -F num="$issue_num" 2>&1); then
                echo "WARNING: Could not query suggestedActors for issue #$issue_num: $actors_result"
              else
                issue_node_id=$(echo "$actors_result" | jq -r '.data.repository.issue.id')
                copilot_bot_id=$(echo "$actors_result" | jq -r '.data.repository.issue.suggestedActors.nodes[] | select(.login=="copilot-swe-agent") | .id')

                if [ -n "$copilot_bot_id" ] && [ "$copilot_bot_id" != "null" ]; then
                  local assign_result
                  if assign_result=$(gh api graphql \
                    -H "GraphQL-Features: issues_copilot_assignment_api_support" \
                    -f query='mutation($issueId:ID!,$botId:ID!){
                      addAssigneesToAssignable(input:{assignableId:$issueId,assigneeIds:[$botId]}){
                        assignable{ ... on Issue { number } }
                      }
                    }' -f issueId="$issue_node_id" -f botId="$copilot_bot_id" 2>&1); then
                    echo "Assigned copilot to issue #$issue_num"
                  else
                    echo "WARNING: Could not assign copilot to issue #$issue_num: $assign_result"
                  fi
                else
                  echo "WARNING: copilot-swe-agent not found in suggestedActors for issue #$issue_num"
                fi
              fi
            done <<< "$pr_numbers"

            # Switch back to read token for next package check
            export GH_TOKEN="$GH_TOKEN_READ"
          }

          # Check both packages
          check_package "@typespec/http-specs" "microsoft/typespec" "packages/http-specs/specs"
          check_package "@azure-tools/azure-http-specs" "Azure/typespec-azure" "packages/azure-http-specs/specs"

          echo "Done!"
